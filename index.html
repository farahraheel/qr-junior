<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>قسم الحاسب الآلي - بطاقة الزائر</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e3a8a);
    color: white;
    text-align: center;
}

/* شاشة الدخول */
.container {
    margin-top: 80px;
}

input {
    padding: 15px;
    width: 250px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
}

button {
    padding: 15px 25px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    background: #22c55e;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

/* بطاقة الزائر */
.card {
    display: none;
    margin-top: 50px;
    padding: 30px;
    background: white;
    color: black;
    width: 320px;
    margin-left: auto;
    margin-right: auto;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h1 {
    color: #22c55e;
}

.school {
    font-weight: bold;
    color: #1e3a8a;
}
</style>
</head>

<body>

<div class="container">
    <h2>👨‍💻 قسم الحاسب الآلي</h2>
    <p>اكتب اسمك لعرض بطاقة الزائر</p>

    <input id="nameInput" placeholder="اكتب اسمك هنا">
    <br>
    <button onclick="showCard()">عرض البطاقة</button>
</div>

<div class="card" id="card">
    <h1>🎉 مرحباً</h1>
    <h2 id="visitorName"></h2>
    <p>أهلاً بك في جناح</p>
    <p class="school">قسم الحاسب الآلي 💻</p>
</div>

<script>
function showCard() {
    let name = document.getElementById("nameInput").value;

    if(name === "") {
        alert("اكتب اسمك أولاً");
        return;
    }

    document.getElementById("visitorName").innerText = name;

    document.getElementById("card").style.display = "block";
}
</script>

</body>
</html>
