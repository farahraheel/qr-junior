<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>قسم الحاسب الآلي - بطاقة زائر</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#0f172a,#020617);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    text-align:center;
}

/* صندوق الإدخال */
.box{
    background: rgba(30,41,59,0.85);
    padding:30px;
    border-radius:20px;
    width:340px;
    box-shadow:0 0 40px rgba(56,189,248,0.15);
    animation: fadeIn 0.8s ease;
}

input{
    width:90%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-top:10px;
    text-align:center;
    outline:none;
}

button{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    background:#0ea5e9;
    transform: scale(1.05);
}

/* بطاقة الزائر */
.card{
    margin-top:20px;
    padding:25px;
    border-radius:18px;
    border:1px solid #38bdf8;
    display:none;
    background: rgba(15,23,42,0.7);
    box-shadow:0 0 25px rgba(56,189,248,0.2);
    animation: pop 0.6s ease;
}

h1{
    margin-bottom:5px;
}

h2{
    color:#38bdf8;
    margin:10px 0;
}

/* حركات */
@keyframes fadeIn{
    from{opacity:0; transform:translateY(-20px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes pop{
    from{opacity:0; transform:scale(0.7);}
    to{opacity:1; transform:scale(1);}
}
</style>
</head>

<body>

<div class="box">

<h2>👨‍💻 قسم الحاسب الآلي</h2>
<p>اكتب اسمك للحصول على بطاقة الزائر</p>

<input type="text" id="name" placeholder="اكتب اسمك هنا">
<br>
<button onclick="showCard()">إنشاء البطاقة</button>

<div class="card" id="card">
    <h1>🎉 مرحباً بك</h1>
    <h2 id="visitorName"></h2>
    <p>👨‍💻 يسعدنا زيارتك لجناح قسم الحاسب الآلي</p>
    <p>✨ نتمنى لك تجربة ممتعة داخل المعرض</p>
    <p style="margin-top:15px;color:#94a3b8">🏆 بطاقة زائر رسمية</p>
</div>

</div>

<script>
function showCard(){
    let name = document.getElementById("name").value;

    if(!name){
        alert("من فضلك اكتب اسمك");
        return;
    }

    let card = document.getElementById("card");
    document.getElementById("visitorName").innerText = name;

    card.style.display = "block";
}
</script>

</body>
</html>
