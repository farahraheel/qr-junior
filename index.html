<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قسم الحاسب الآلي</title>
    
    <!-- استدعاء خط Cairo الاحترافي بأوزان متعددة -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-glow: #22c55e;
            --primary-gradient: linear-gradient(135deg, #4ade80, #16a34a);
            --bg-gradient: linear-gradient(135deg, #020617, #0f172a, #1e3a8a, #042f2e);
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.12);
            --card-glow: 0 0 30px rgba(34, 197, 94, 0.25);
        }

        body {
            margin: 0;
            padding: 30px 20px;
            font-family: 'Cairo', sans-serif;
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        /* حركة ديناميكية للخلفية لتغيير الألوان ببطء */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* الترويسة والشعار */
        .logo-container {
            margin-top: 10px;
            margin-bottom: 30px;
            text-align: center;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px 40px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255,255,255,0.1);
        }
        
        .logo-container img {
            border-radius: 16px;
            margin-bottom: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: transform 0.4s ease;
        }

        .logo-container :hover img {
            transform: rotate(5deg) scale(1.05);
        }

        .logo-text {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 0.5px;
            background: linear-gradient(120deg, #ffffff, #a7f3d0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* حاوية الإدخال الرئيسية */
        .main-box {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 35px 30px;
            border-radius: 28px;
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255,255,255,0.05);
            box-sizing: border-box;
            transition: border-color 0.3s ease;
        }

        .main-box:focus-within {
            border-color: rgba(34, 197, 94, 0.4);
        }

        h2 {
            font-size: 24px;
            font-weight: 700;
            margin: 0 0 10px 0;
            background: linear-gradient(90deg, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 15px;
            color: #94a3b8;
            margin: 0 0 30px 0;
            font-weight: 300;
        }

        /* حقل إدخال النص */
        .input-wrapper {
            position: relative;
            width: 100%;
        }

        input {
            padding: 18px;
            width: 100%;
            border-radius: 16px;
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
            text-align: center;
            outline: none;
            background: rgba(15, 23, 42, 0.6);
            color: #ffffff;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
            letter-spacing: 0.5px;
        }

        input::placeholder {
            color: #64748b;
            font-weight: 400;
        }

        input:focus {
            border-color: var(--primary-glow);
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
        }

        /* تصميم الزر التفاعلي */
        button {
            padding: 16px 30px;
            width: 100%;
            margin-top: 20px;
            border: none;
            border-radius: 16px;
            background: var(--primary-gradient);
            color: #020617;
            font-size: 17px;
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(34, 197, 94, 0.3);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(34, 197, 94, 0.5);
            filter: brightness(1.1);
        }
        
        button:active {
            transform: translateY(-1px);
        }

        /* بطاقة الزائر الفاخرة */
        .card {
            display: none;
            margin-top: 35px;
            padding: 45px 30px;
            width: 100%;
            max-width: 420px;
            border-radius: 32px;
            background: rgba(15, 23, 42, 0.55);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(34, 197, 94, 0.3);
            box-shadow: var(--card-glow), 0 30px 60px rgba(0, 0, 0, 0.6);
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
            animation: ultraPop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        /* شريط مضيء علوي داخل البطاقة */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--primary-gradient);
        }

        @keyframes ultraPop {
            from { transform: translateY(40px) scale(0.85); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        .card h1 {
            color: #ffffff;
            font-size: 24px;
            font-weight: 400;
            margin: 0 0 10px 0;
        }

        #visitorName {
            font-size: 30px;
            font-weight: 900;
            color: var(--primary-glow);
            margin: 15px 0;
            word-wrap: break-word;
            text-shadow: 0 0 15px rgba(34, 197, 94, 0.4);
        }

        .school {
            font-weight: 700;
            color: #a7f3d0;
            font-size: 18px;
            margin-top: 5px;
            margin-bottom: 0;
            background: linear-gradient(90deg, #a7f3d0, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .small {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 5px;
            font-weight: 400;
        }
    </style>
</head>

<body>

<!-- قسم الشعار العلوي -->
<div class="logo-container">
    <img src="./IMG_5131.JPG" width="95" alt="شعار القسم">
    <div class="logo-text">💻 قسم الحاسب الآلي</div>
</div>

<!-- حاوية إدخال البيانات -->
<div class="main-box">
    <h2>👋 مرحباً بك في جناحنا</h2>
    <p class="subtitle">سجل اسمك لتستلم بطاقة زيارتك الرقمية</p>

    <div class="input-wrapper">
        <input id="nameInput" placeholder="اكتب اسمك الثلاثي هنا..." autocomplete="off">
    </div>
    <button onclick="showCard()">إصدار البطاقة الآن</button>
</div>

<!-- بطاقة الزائر الذكية -->
<div class="card" id="card">
    <h1>🎉 أهلاً وسهلاً بك</h1>
    <div id="visitorName"></div>
    <p class="small">يسعدنا ويشرفنا زيارتك لجناح</p>
    <div class="school">قسم الحاسب الآلي 💻</div>
</div>

<script>
function showCard() {
    const nameInput = document.getElementById("nameInput");
    const name = nameInput.value.trim();

    if(name === "") {
        alert("من فضلك أدخل اسمك لتصميم بطاقتك اللطيفة ✨");
        nameInput.focus();
        return;
    }

    document.getElementById("visitorName").innerText = name;
    
    const card = document.getElementById("card");
    card.style.display = "block";
    
    // تمرير سلس ليظهر الكارت بالكامل في الشاشات المختلفة
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// تشغيل الزر فوراً عند الضغط على Enter
document.getElementById("nameInput").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        showCard();
    }
});
</script>

</body>
</html>
