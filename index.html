<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> قسم الحاسب الآلي</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-green: #00ff66;
            --neon-cyan: #00e5ff;
            --bg-dark: #060b13;
            --panel-bg: rgba(10, 20, 38, 0.7);
            --border-glow: rgba(0, 229, 255, 0.2);
        }

        body {
            margin: 0;
            padding: 40px 20px;
            font-family: 'Cairo', sans-serif;
            background: radial-gradient(circle at center, #0f2042 0%, var(--bg-dark) 70%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* حاوية الشعار الجذابة والمستقبلية */
        .brand-logo-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 35px;
            position: relative;
        }

        /* دائرة هالة الضوء الملون خلف الشعار */
        .logo-glow-effect {
            width: 110px;
            height: 110px;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-green));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4px;
            box-shadow: 0 0 35px rgba(0, 229, 255, 0.4), inset 0 0 15px rgba(255,255,255,0.3);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .logo-glow-effect img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--bg-dark);
        }

        .brand-logo-zone:hover .logo-glow-effect {
            transform: scale(1.08) rotate(7deg);
        }

        .brand-title {
            margin-top: 15px;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #ffffff, var(--neon-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        /* واجهة لوحة التحكم الإدخالية */
        .control-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-glow);
            padding: 40px 35px;
            border-radius: 28px;
            width: 100%;
            max-width: 440px;
            box-sizing: border-box;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            text-align: center;
            position: relative;
        }

        .control-panel::after {
            content: '';
            position: absolute;
            bottom: 0; right: 10%; left: 10%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-green), transparent);
        }

        .control-panel h2 {
            font-size: 22px;
            font-weight: 700;
            margin: 0 0 8px 0;
            color: #f1f5f9;
        }

        .control-panel p {
            font-size: 14px;
            color: #94a3b8;
            margin: 0 0 30px 0;
        }

        /* حقل نصي فضائي ذكي */
        .input-container {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 18px 20px;
            background: rgba(5, 10, 20, 0.8);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            text-align: center;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--neon-cyan);
            background: rgba(5, 10, 20, 0.95);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.15), inset 0 0 8px rgba(0, 229, 255, 0.05);
        }

        input::placeholder {
            color: #475569;
        }

        /* زر التوليد النيون المستقبلي */
        .neon-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            font-family: 'Cairo', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: #060b13;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-green));
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 255, 102, 0.25);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .neon-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 255, 102, 0.45);
            filter: saturate(1.2);
        }

        /* بطاقة الزائر المتطورة من تصميم الـ UI الجديد */
        .visitor-card {
            display: none;
            margin-top: 35px;
            width: 100%;
            max-width: 440px;
            background: linear-gradient(145deg, rgba(15, 23, 42, 0.8), rgba(6, 11, 19, 0.9));
            border-radius: 30px;
            padding: 40px 30px;
            box-sizing: border-box;
            border: 1px solid rgba(0, 255, 102, 0.25);
            box-shadow: 0 30px 60px rgba(0,0,0,0.7), 0 0 40px rgba(0, 255, 102, 0.1);
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: slideUpReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* تأثير خط التزيين الجانبي اللامع للبطاقة */
        .visitor-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 5px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-green));
        }

        @keyframes slideUpReveal {
            from { opacity: 0; transform: translateY(50px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .welcome-text {
            font-size: 14px;
            font-weight: 600;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .visitor-name-display {
            font-size: 32px;
            font-weight: 900;
            color: #ffffff;
            margin: 15px 0;
            line-height: 1.3;
            word-wrap: break-word;
            text-shadow: 0 0 20px rgba(255,255,255,0.15);
        }

        .footer-note {
            font-size: 13px;
            color: #64748b;
            margin-top: 25px;
            margin-bottom: 5px;
        }

        .dept-tag {
            font-size: 18px;
            font-weight: 700;
            color: var(--neon-green);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.2);
        }
    </style>
</head>

<body>

<div class="brand-logo-zone">
    <div class="logo-glow-effect">
        <img src="./IMG_5131.JPG" alt="شعار القسم">
    </div>
    <div class="brand-title">قسم الحاسب الآلي</div>
</div>

<div class="control-panel">
    <h2>👋 مرحباً بك في جناحنا</h2>
    <p>قم بتسجيل اسمك </p>

    <div class="input-container">
        <input id="userNameField" placeholder="أدخل اسمك الكريم هنا..." autocomplete="off">
    </div>
    <button class="neon-btn" onclick="generatePassport()">إصدار تصريح الزيارة</button>
</div>

<div class="visitor-card" id="passportCard">
    <div class="welcome-text">✦ تـصـريـح زيـارة رقـمـي ✦</div>
    <div class="visitor-name-display" id="displayName"></div>
    <div class="footer-note">يسعدنا ويشرفنا حضوركم الرائع في جناح</div>
    <div class="dept-tag">💻 قسم الحاسب الآلي 💻</div>
</div>

<script>
function generatePassport() {
    const inputField = document.getElementById("userNameField");
    const nameData = inputField.value.trim();

    if(nameData === "") {
        alert("لطفاً، قم بكتابة الاسم أولاً لتوليد البطاقة التفاعلية! 🌟");
        inputField.focus();
        return;
    }

    // ربط وعرض الاسم داخل البطاقة
    document.getElementById("displayName").innerText = nameData;
    
    // إظهار البطاقة وتفعيل الأنيميشن
    const cardElement = document.getElementById("passportCard");
    cardElement.style.display = "block";
    
    // التمرير الذكي والسلس للشاشات الصغيرة والتابلت لمشاهدة التصميم
    cardElement.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// تشغيل الواجهة تلقائياً وبذكاء عند الضغط على مفتاح Enter في الكيبورد
document.getElementById("userNameField").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        generatePassport();
    }
});
</script>

</body>
</html>
