<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قسم الحاسب الآلي</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-color: #22c55e;
            --primary-hover: #16a34a;
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e3a8a, #0f766e);
            --glass-bg: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-glow: 0 0 15px rgba(34, 197, 94, 0.5);
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Cairo', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        /* الشعار والترويسة */
        .logo {
            margin-top: 20px;
            font-size: 20px;
            font-weight: 800;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 15px 30px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }
        
        .logo img {
            border-radius: 12px;
            margin-bottom: 8px;
            object-fit: cover;
        }

        /* الحاوية الرئيسية للمدخلات */
        .container {
            margin-top: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
            box-sizing: border-box;
        }

        h2 {
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 10px;
        }

        p {
            font-size: 15px;
            color: #cbd5e1;
            margin-top: 0;
            margin-bottom: 25px;
        }

        /* حقل الإدخال */
        input {
            padding: 16px;
            width: 100%;
            border-radius: 14px;
            border: 2px solid transparent;
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
            text-align: center;
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            color: #1e293b;
            font-weight: 600;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.3);
            background: #ffffff;
        }

        /* الزر */
        button {
            padding: 14px 30px;
            width: 100%;
            margin-top: 15px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(90deg, var(--primary-color), var(--primary-hover));
            color: white;
            font-size: 16px;
            font-family: 'Cairo', sans-serif;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.6);
        }
        
        button:active {
            transform: translateY(1px);
        }

        /* بطاقة الزائر المتطورة */
        .card {
            display: none;
            margin-top: 40px;
            padding: 40px 30px;
            width: 100%;
            max-width: 400px;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.45), inset 0 0 20px rgba(255,255,255,0.05);
            box-sizing: border-box;
            animation: modernPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* حركة الظهور الاحترافية */
        @keyframes modernPop {
            from { transform: translateY(30px) scale(0.9); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }

        .card h1 {
            color: var(--primary-color);
            font-size: 28px;
            font-weight: 800;
            margin: 0 0 15px 0;
            text-shadow: var(--text-glow);
        }

        #visitorName {
            font-size: 24px;
            font-weight: 800;
            color: #ffffff;
            margin: 10px 0;
            word-wrap: break-word;
        }

        .school {
            font-weight: 800;
            color: #a7f3d0;
            font-size: 18px;
            margin-bottom: 0;
        }

        .small {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 5px;
        }
    </style>
</head>

<body>

<div class="logo">
    <img src="./IMG_5131.JPG" width="90" alt="شعار القسم">
    <br>
    💻 قسم الحاسب الآلي
</div>

<div class="container">
    <h2>👋 مرحباً بك في جناحنا</h2>
    <p>اكتب اسمك لعرض بطاقة الزائر</p>

    <input id="nameInput" placeholder="اكتب اسمك الكريم هنا..." autocomplete="off">
    <button onclick="showCard()">عرض البطاقة</button>
</div>

<div class="card" id="card">
    <h1>🎉 أهلاً وسهلاً</h1>
    <div id="visitorName"></div>
    <p class="small">يسعدنا زيارتك لجناح</p>
    <p class="school">قسم الحاسب الآلي 💻</p>
</div>

<script>
function showCard() {
    let nameInput = document.getElementById("nameInput");
    let name = nameInput.value.trim();

    if(name === "") {
        alert("من فضلك اكتب اسمك أولاً ✨");
        nameInput.focus();
        return;
    }

    document.getElementById("visitorName").innerText = name;
    
    let card = document.getElementById("card");
    card.style.display = "block";
    
    // التمرير السلس للأسفل ليظهر الكارت بالكامل في الشاشات الصغيرة
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ميزة إضافية: الضغط على زر Enter يقوم بتشغيل الزر تلقائياً
document.getElementById("nameInput").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        showCard();
    }
});
</script>

</body>
</html>
